<html lang="en">
<head>

    <style>
        .box{
            text-align: center;
            background-color: rgba(179, 211, 178, 0.945);
        }
        .box2{
            background-color: rgb(7, 44, 44);
            color: white;
            margin-bottom:15px;
            padding:10px;
            
        }

<body>
    <div class="box" >
    <h1>Internship Form</h1>
 <form  action="form.do" method="get">
    <label for="uname" placeholder="Enter your name">UserName  : </label>
    <input type="text"id="uname" name="uname" required><br><br><br>

     <label for="email" placeholder="Enter your email">UserEmail  : </label>
    <input type="email"id="email" name="email" required><br><br><br>

     <label for="psb" placeholder="Enter password ">Password  : </label>
    <input type="password"id="psb" name="password" required><br><br><br>

     <label for="ph" placeholder="Enter phone no.">phone No. : </label>
    <input type="number"id="ph" name="ph" required><br><br><br>

    <input type ="submit" class="box2" value="Submit">
    </form>    
    </div>
    
</body>
