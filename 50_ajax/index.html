<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <!-- #############  SignUp Modal ######### Start ######### -->
    <div class="modal fade" id="signup-modal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">User SignUp</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-5">
                    <form id="signup_form">
                        <div class="mb-3">
                            <label for="uname" class="form-label">User Name</label>
                            <input type="text" class="form-control" id="uname">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary me-4" id="signup_btn">SignUp</button>
                </div>
            </div>
        </div>
    </div>
    <!-- #############  SignUp Modal ######### End ######### -->

    <!-- #############  SignIn Offcanvas ######### Start ######### -->
     <!-- ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ -->
    <div class="offcanvas offcanvas-start" id="signin_offcanvas">
        <div class="toast position-fixed top-0 start-0 m-2" id="signin_error">
            <div class="toast-header bg-danger text-light fw-bold">
                Sorry SignIn Failed... Either email or password is Incorrect...
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
        </div> 
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">User SignIn</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body px-4">
            <form id="signin_form" class="border border-secondary rounded p-5 bg-secondary-subtle shadow-lg">                
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="_email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="_password">
                </div>
                <button type="button" class="btn btn-primary" id="signin_btn">SignIn</button>
            </form>
        </div>
    </div>
    <!-- #############  SignIn Offcanvas ######### End ######### -->

<!-- #############  products modal ######### start ######### -->
     <div class="modal fade" id="product_modal">
<div class="modal-dialog">
    <div class="modal-content">

        <div class="modal-header">
       <h4 class="modal-title">New Product</h4>
       <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
 <form action="#" id="product_form">
<div class="form-floating mb-3">
    <input type="text" id="product_name" class="form-control" placeholder="some product name">
 <label for="product_name" class="form-label">Product Name</label>
</div>
 
<div class="form-floating mb-3">
    <input type="number" id="product_quantity" class="form-control" placeholder=" product quantity">
 <label for="product_quantity" class="form-label">Product Quantity</label>
</div>
<div class="form-floating mb-3">
    <input type="number" id="product_price" class="form-control" placeholder="product price">
 <label for="product_price" class="form-label">Product Price</label>
</div>
<div class="form-floating mb-3">
    <textarea type="text" id="product_description" class="form-control" placeholder="product description"></textarea>
 <label for="product_description" class="form-label">Product Description</label>
</div>
</form>
        </div>

        <div class="modal-footer">
<button   type="button" class="btn btn-primary" id="save_product_btn">Save Product</button>
        </div>
      </div>
   </div>
</div>
<!-- #############  products modal ######### End ######### -->


    <div class="container">
        <div class="row bg-primary-subtle">
            <div class="col py-3 ps-4">
                <img src="logo.png" style="width:45px">
                <h4 class="d-inline-block ms-2 text-primary-emphasis">ISRDC INC.</h4>
            </div>
            <div class="col text-end py-3">
                
                <span id="signin_signup_box">
               <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#signup-modal"
                    id="sup">SignUp</button>
                <button type="button" class="btn btn-success me-3 ms-2" id="sin" data-bs-toggle="offcanvas" data-bs-target="#signin_offcanvas">SignIn</button>    
                </span>
                <span id="signout_welcome_box"class="d-none">
                  <span id="welcome_user">Welcome</span>
                  <button type="button"class="btn btn-danger me-3 ms-2"id="sout">Signout</button>
                </span>
            </div>
        </div>
        <!-- ####################################### menu bar ############################################ -->
        <div class="row d-none" id="user_area">
            <div class="col">
                <div class="row">
                    <div class="col">
                        <ul class="nav nav-pills ms-3 mt-3">
                            <li class="nav-item"><a href="#" class="nav-link active">Product</a></li>
                         <li class="nav-item"><a href="#" class="nav-link ">About Us</a></li>
                         <li class="nav-item"><a href="#" class="nav-link ">Contact Us</a></li>
                        
                        
                        </ul>
                   
                    </div>
                </div>
                <hr>
                <!-- ####################  Add product button  ################################################## -->
                <div class="row">
                    <div class="col text-end">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#product_modal">New Products</button>
                    </div>
                </div>
<!-- ####################  Add product view #####################-->
                <div class="row"id="all_products">
                 </div>
            </div>
        </div>

    </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"> </script>

    
 <script>
    let user=null;
// #############  products fields ######### start######### -->
   const saveProductBtn=document.querySelector('#save_product_btn');
    const productName=document.querySelector('#product_name');
   const productPrice=document.querySelector('#product_price');
   const productQuantity=document.querySelector('#product_quantity');
   const productDescription=document.querySelector('#product_description');
 const userArea=document.querySelector('#user_area');
 const productModal=new bootstrap.Modal('#product_modal');
 const productForm=document.querySelector('#product_form');
 const allProducts=document.querySelector('#all_products');
   //#############  products fields ######### End ######### -->

  
 // ################## Signout Fields ######### start #############
const signinSignupBox=document.querySelector('#signin_signup_box');
const signOutBtn=document.querySelector('#sout');
const welcomeUser=document.querySelector('#welcome_user');
const signoutWelcomeBox=document.querySelector('#signout_welcome_box');
// ################## Signout Fields ######### end #############
      
 
 
 // ################## SignIn Fields ######### start #############
        const signinBtn = document.querySelector('#signin_btn');
         const signinError = document.querySelector('#signin_error');
        const signinErrorToast = bootstrap.Toast.getOrCreateInstance(signinError);
         const _email = document.querySelector('#_email');
        const _password = document.querySelector('#_password');
        const signinOffcanvas = new bootstrap.Offcanvas('#signin_offcanvas');
        const signinForm = document.querySelector('#signin_form');
        // ################## SignIn Fields ######### end #############

       
        // ################## SignUp Fields ######### start #############
        const uname = document.querySelector('#uname');
        const email = document.querySelector('#email');
        const password = document.querySelector('#password');
        const signupModal = new bootstrap.Modal('#signup-modal');
        const signupForm = document.querySelector('#signup_form');
        const signupBtn = document.querySelector('#signup_btn');
         // ################## SignUp Fields ######### end #############


//####################################index file refresh start #######################################
    const handleFileRefresh=()=>{
       const refreshReq=new XMLHttpRequest();
       refreshReq.open('get','fetch_user.do',true);
       refreshReq.addEventListener('readystatechange',()=>{
        if(refreshReq.readyState ==4 && refreshReq.status==200){
            const flag=refreshReq.responseText;
            if(flag=='false'){

            }else{
                   signinSignupBox.style.display = 'none';
                        signoutWelcomeBox.classList.remove('d-none');
                        userArea.classList.remove('d-none');
                        // console.log(flag);
                        user = JSON.parse(flag);

                        welcomeUser.innerText = 'Welcome ' + user.name;

                        collectAllProducts();
                        // console.log(user.name);
            }
        }
       });
       refreshReq.send();

    };
handleFileRefresh();
//####################################index file refresh end #######################################









 // ############### Show Product ####################### start ########################
        const collectAllProducts = () => {
            const allProductsReq = new XMLHttpRequest();

            allProductsReq.open('get', 'all_products.do', true);

            allProductsReq.addEventListener('readystatechange', () => {
                if(allProductsReq.readyState == 4 && allProductsReq.status == 200) {
                    let products = JSON.parse(allProductsReq.responseText);
              allProducts.innerHTML='';
                    console.log(products);

                    for(let product of products) {
                        let col = document.createElement('div');
                        col.classList.add('col-xxl-3');
                        col.classList.add('col-lg-4');
                        col.classList.add('col-md-6');
                      //  col.classList.add('col-mt-5');

                        let card = document.createElement('div');
                        card.classList.add('card');
                         card.classList.add('mx-auto');
                        card.classList.add('position-relative');
                        card.style.width = '18rem';

                        let cardBody = document.createElement('div');
                        cardBody.classList.add('card-body');
                        
                        let delImg=document.createElement('img');
                       delImg.src='del.png';
                        delImg.classList.add('position-absolute');
                        delImg.classList.add('del');
                          // delImg.classList.add('top-50');
                        // delImg.classList.add('end-50');
                         delImg.style.top = '1rem';
                        delImg.style.right = '1rem';
                        delImg.id=product.productId;
                        cardBody.append(delImg);  
                        let pname = null;
                        let pprice = null;
                        let pquantity = null;
                        let pdscrp = null;
                        for(let prop  in product) {
                            if(prop == 'name') {
                                pname = product[prop];
                            } else if(prop == 'description') {
                                pdscrp = product[prop];
                            } else if(prop == 'price') {
                                pprice = product[prop];
                            } else if(prop == 'quantity') {
                                pquantity = product[prop];
                            }                            
                        }

                        let title = document.createElement('h5');
                        title.classList.add('card-title');
                        title.innerText = pname.substring(0,16)+'...';
                        title.title=pname;
                        cardBody.append(title);

                        let descp = document.createElement('p');
                        descp.classList.add('card-text'); 
                        descp.innerText = pdscrp;
                        cardBody.append(descp);

                        let price = document.createElement('span');
                        price.innerText = `Price: ${pprice}`;
                        cardBody.append(price);

                        let quantity = document.createElement('span');
                        quantity.innerText = `Quantity: ${pquantity}`;
                        quantity.classList.add('float-end');
                        cardBody.append(quantity);

                        card.append(cardBody);
                        col.append(card);

                        allProducts.append(col);
                    }

                    allProducts.addEventListener('click',(ev)=>{
                        console.log(ev.target.tagName);
                       console.log(ev.target.className);
                        console.log(ev.target.className.includes("del"));
                        console.log(typeof ev.target.className);
                        if(ev.target.className.includes("del")){
                            console.log(ev.target.parentNode.parentNode);
                         //  ev.target.parentNode.parentNode.remove();
                            let delReq=new XMLHttpRequest();
                            delReq.open('get','del_product.do?product_id='+ev.target.id,false);
                                  
                            delReq.addEventListener('readystatechange',()=>{
                                if(delReq.readyState ==4 && delReq.status==200 ){
                                     console.log("Response text : ",delReq.responseText);
                                    if(delReq.responseText == 'true'){
                                        ev.target.parentNode.parentNode.parentNode.remove();
                                    }
                                }
                            });
                            delReq.send();
                        }
                    })
                }
            });

            allProductsReq.send();
        };
        // ############### Show Product ####################### end ########################

       
       
       
         // ############### SignIn ####################### start ########################
        signinBtn.addEventListener('click', () => {
            const signinReq = new XMLHttpRequest();
            signinReq.open('get', 'signin.do?email=' + _email.value + '&password=' + _password.value, true);
            signinReq.addEventListener('readystatechange', () => {
                if(signinReq.readyState == 4 && signinReq.status == 200) {
                    const flag = signinReq.responseText;
                    if(flag == 'false') {
                        signinErrorToast.show();
                         } else {
                       signinOffcanvas.hide();
                        signinForm.reset();
                        signinSignupBox.style.display='none';
                   signoutWelcomeBox.classList.remove('d-none');
                   userArea.classList.remove('d-none');
                 user=JSON.parse(flag);
                   welcomeUser.innerText='Welcome '+user.name;
                   collectAllProducts();
                }
                }
            });
          signinReq.send();
        });
        // ############### SignIn ####################### end ########################
        
       
       
        // ############### SignUp ####################### start ########################
        signupBtn.addEventListener('click', () => {
            const signupReq = new XMLHttpRequest();
           signupReq.open('get', 'signup.do?uname=' + uname.value + '&email=' + email.value + '&password=' + password.value, true);
           signupReq.addEventListener('readystatechange', () => {
                let resp = signupReq.responseText;
                console.log(resp, typeof resp);
                if (resp == 'true') {
                    signupForm.reset();
                    signupModal.hide();
                }
            });
           signupReq.send();
        });
        // ############### SignUp ####################### end ########################
    
     
        // ############### Signout ####################### start ########################
          signOutBtn.addEventListener('click',()=>{
             const signoutReq=new XMLHttpRequest();
             signoutReq.open('get','signout.do',true);
             signoutReq.addEventListener('readystatechange',()=>{
                   if(signoutReq.readyState==4 && signoutReq.status==200){
                    if(signoutReq.responseText=='true'){
                        signinSignupBox.style.display='inline';
                        signoutWelcomeBox.classList.add('d-none');
                        userArea.classList.add('d-none');
                        allProducts.innerHTML='';
                      }
                   }
             });
             signoutReq.send();
          });
 // ############### Signout ####################### end ########################



     // ############### save  product ####################### start ########################
         saveProductBtn.addEventListener('click',()=>{
            const saveProductReq=new XMLHttpRequest();
             saveProductReq.open('get','save_product.do?product_name='+productName.value+'&product_price='+productPrice.value+'&product_quantity='+productQuantity.value+'&product_description='+productDescription.value,true);
             saveProductReq.addEventListener('readystatechange',()=>{
if( saveProductReq.readyState==4 &&  saveProductReq.status==200){
                if( saveProductReq.responseText=='true'){
                    productModal.hide();
                    productForm.reset();
                }  }
             });
              saveProductReq.send();
            });
 // ###############   save product  ####################### end ########################
        
       
       
    </script>
</body>
