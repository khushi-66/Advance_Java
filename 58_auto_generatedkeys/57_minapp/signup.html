<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        .x{
            padding:10px;
            margin-bottom:15px;
            border-radius: 8px;
            border: 3px solid rgb(248, 248, 244);
             background-color:  rgb(66, 131, 138);

        }
        .box{
            text-align: center;
             border:1px solid rgb(51, 47, 47);

            box-shadow: 5px 5px 3px rgb(231, 226, 226);
           display:inline-block;
           padding:60px;
           margin-left:35%;
           margin-top:20px;
           background-color: rgb(245, 253, 249);
            
        }
        form{
            margin-top:30px;
           
        }

            border: 3px solid rgb(44, 94, 94);;
            background-color: rgb(44, 94, 94);
             color:rgb(248, 238, 244);
        }

        .submit:hover{
            background-color:  rgb(66, 131, 138);
             border: 3px solid rgb(66, 131, 138);;
        }

         .btn{

</head>
<body>

    <div class="box">
        <button class="x">SignUp Form</button>
 <form   action="signup.do" enctype="multipart/form-data" method="post">
  
       <p1>User Name :</p1>

       <br><br>

     <a href="index.html" class="submit btn">Back</a>
    </div>
   
</body>
</html>
